services:
  speedtest:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: speedtest-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT}:${PORT}"
    volumes:
      - ./backend/data:/app/data
    environment:
      - TZ=Europe/London
      - GIN_MODE=release
    env_file:
      - .env
