version: 1
deployment:
  name: "speedtest-stack"
  description: "Ookla Speedtest Dashboard stack using native docker image"
services:
  speedtest:
    artifact: "speedtest-dashboard@latest"
    type: "docker-image"
    ports:
      - "4000:8080"
    volumes:
      - "speedtest_data:/app/data"
    environment:
      PORT: "8080"
      DB_PATH: "/app/data/speedtest.db"
      SPEEDTEST_BINARY: "speedtest"
      GIN_MODE: "release"
    healthCheck:
      endpoint: "GET http://172.20.0.100:4000/api/status"
      interval: "30s"
      timeout: "5s"
      retries: 3
      unhealthyThreshold: 2
volumes:
  speedtest_data: {}
